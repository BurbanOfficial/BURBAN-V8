    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion, setDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyDb4AOtRT7jGENnLZ2KNwpczaG2Z77G2rc",
            authDomain: "burban-fidelity.firebaseapp.com",
            projectId: "burban-fidelity",
            storageBucket: "burban-fidelity.firebasestorage.app",
            messagingSenderId: "830299174800",
            appId: "1:830299174800:web:f50a4ec419e108f7f16515",
            measurementId: "G-E4QD4PYLM5"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const tempOrderId = urlParams.get('temp_order');
        const paymentIntentId = urlParams.get('payment_intent');

        async function finalizeOrder(user) {
            if (!tempOrderId) return;

            // Éviter le double traitement
            if (sessionStorage.getItem('order_processed_' + tempOrderId)) return;
            sessionStorage.setItem('order_processed_' + tempOrderId, '1');

            try {
                const tempOrderDoc = await getDoc(doc(db, 'temp_orders', tempOrderId));
                if (!tempOrderDoc.exists() || tempOrderDoc.data().deleted) return;

                const tempOrder = tempOrderDoc.data();

                // Générer numéro de commande
                const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                const orderNumber = 'BR' + String(Date.now()).slice(-9) + letters[Math.floor(Math.random() * 26)] + letters[Math.floor(Math.random() * 26)];

                // Déduire le stock
                const productsSnapshot = await getDocs(collection(db, 'products'));
                for (const item of tempOrder.items) {
                    const productDoc = productsSnapshot.docs.find(d => d.data().id === item.id);
                    if (productDoc) {
                        const product = productDoc.data();
                        const variantKey = `${item.color}-${item.size}`;
                        product.stockByVariant[variantKey] = Math.max(0, (product.stockByVariant[variantKey] || 0) - item.quantity);
                        await setDoc(doc(db, 'products', `${product.id}`), product);
                    }
                }

                // Récupérer les 4 derniers chiffres de la carte
                let cardLast4 = 'XXXX';
                try {
                    if (paymentIntentId) {
                        const r = await fetch(`https://burban-v8.onrender.com/payment-details/${paymentIntentId}`);
                        const d = await r.json();
                        cardLast4 = d.cardLast4 || 'XXXX';
                    }
                } catch (e) {}

                // Créer la commande définitive
                const orderData = {
                    orderNumber,
                    userId: user ? user.uid : 'guest',
                    userEmail: (user ? user.email : null) || tempOrder.shippingAddress?.email,
                    paymentIntentId: paymentIntentId || null,
                    items: tempOrder.items,
                    total: tempOrder.total,
                    discount: tempOrder.discount,
                    voucherPoints: tempOrder.voucher ? tempOrder.voucher.points : 0,
                    cardLast4,
                    status: 'processing',
                    trackingUrl: null,
                    date: new Date().toISOString(),
                    shippingAddress: tempOrder.shippingAddress,
                    billingAddress: tempOrder.billingAddress
                };
                await setDoc(doc(db, 'orders', orderNumber), orderData);

                // Mettre à jour les points si connecté
                if (user) {
                    try {
                        const userRef = doc(db, 'users', user.uid);
                        const userDoc = await getDoc(userRef);
                        const userData = userDoc.data();
                        const pointsEarned = Math.floor(tempOrder.total * 10);
                        let newPoints = (userData.points || 0) + pointsEarned;
                        const updates = [];
                        if (tempOrder.voucher) {
                            newPoints -= tempOrder.voucher.points;
                            updates.push({ points: -tempOrder.voucher.points, description: `Échange de ${tempOrder.voucher.points} points contre un bon de ${tempOrder.voucher.discount}€`, date: new Date().toISOString() });
                        }
                        updates.push({ points: pointsEarned, description: `Ajout de ${pointsEarned} points suite à votre achat`, date: new Date().toISOString() });
                        await updateDoc(userRef, { points: newPoints, pointsHistory: arrayUnion(...updates), orders: arrayUnion(orderNumber) });
                    } catch (e) { console.error('Erreur points:', e); }
                }

                // Marquer la commande temporaire comme traitée
                await setDoc(doc(db, 'temp_orders', tempOrderId), { deleted: true }, { merge: true });

                // Vider le panier
                localStorage.removeItem('cart');

                // Envoyer email de confirmation
                const customerEmail = tempOrder.shippingAddress?.email || (user ? user.email : null);
                const customerName = `${tempOrder.shippingAddress?.firstName || ''} ${tempOrder.shippingAddress?.lastName || ''}`.trim();
                if (customerEmail) {
                    try {
                        await fetch('https://burban-v8.onrender.com/send-order-email', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                type: 'confirmation',
                                email: customerEmail,
                                customerName,
                                orderNumber,
                                orderDate: new Date().toLocaleDateString('fr-FR'),
                                items: tempOrder.items,
                                total: tempOrder.total,
                                shippingAddress: tempOrder.shippingAddress
                            })
                        });
                    } catch (e) { console.error('Erreur email:', e); }
                }

                console.log('Commande finalisée:', orderNumber);
            } catch (error) {
                console.error('Erreur finalisation commande:', error);
                sessionStorage.removeItem('order_processed_' + tempOrderId);
            }
        }

        // Attendre Firebase Auth avec timeout
        let orderProcessed = false;
        const authTimeout = setTimeout(async () => {
            if (!orderProcessed) {
                orderProcessed = true;
                await finalizeOrder(null); // Guest
            }
        }, 3000);

        onAuthStateChanged(auth, async (user) => {
            if (!orderProcessed) {
                orderProcessed = true;
                clearTimeout(authTimeout);
                await finalizeOrder(user); // Connecté ou null
            }
        });
    </script>
